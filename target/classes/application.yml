spring:
  application:
    name: coreapi

  datasource:
    url: jdbc:postgresql://localhost:5432/assignment_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.assignment: DEBUG
